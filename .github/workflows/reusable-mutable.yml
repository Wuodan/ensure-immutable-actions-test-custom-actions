name: Remote Reusable Workflow Mutable

on:
  workflow_call:

jobs:
  local-from-caller:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/local-from-workflow

  nested-reusable:
    uses: ./.github/workflows/nested-mutable.yml

  remote-nested:
    runs-on: ubuntu-latest
    steps:
      - uses: Wuodan/ensure-immutable-actions-test-custom-actions/composite-actions/leaf@5c32c76d1aaf7c9a13069971dd2f2eb0c14d75f6
